<!DOCTYPE html>
<html lang="es-CO">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="description" content="Ayuda Ciudadana — Tu plataforma legal gratuita para colombianos"/>
  <meta name="theme-color" content="#0F2A5E"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta property="og:title" content="Ayuda Ciudadana 🤝 — Tu plataforma legal"/>
  <meta property="og:description" content="La plataforma legal más completa de Colombia. Gratis."/>
  <title>Ayuda Ciudadana 🤝</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:#0F2A5E;font-family:system-ui,sans-serif;}
    #splash{position:fixed;inset:0;background:linear-gradient(135deg,#0F2A5E,#1e40af);
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      color:#fff;z-index:9999;transition:opacity .6s ease;}
    .ico{font-size:56px;margin-bottom:16px;animation:bob 1.5s ease infinite;}
    .nom{font-size:26px;font-weight:800;letter-spacing:-0.5px;margin-bottom:6px;}
    .sub{font-size:14px;opacity:.6;margin-bottom:28px;}
    .bar{width:180px;height:4px;background:rgba(255,255,255,.15);border-radius:99px;overflow:hidden;}
    .fill{height:100%;background:#fff;border-radius:99px;width:0;transition:width .3s;}
    @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
    #root{min-height:100vh;background:#F0F2F9;}
  </style>
</head>
<body>
  <div id="splash">
    <div class="ico">🤝</div>
    <div class="nom">Ayuda Ciudadana</div>
    <div class="sub">Tu plataforma legal gratuita</div>
    <div class="bar"><div class="fill" id="barra"></div></div>
  </div>
  <div id="root"></div>

  <script>
    var pct=0,barra=document.getElementById('barra');
    var prog=setInterval(function(){pct+=pct<80?3:.3;if(pct>95)pct=95;barra.style.width=pct+'%';},150);
    var timeout=setTimeout(function(){
      document.getElementById('splash').innerHTML='<div style="text-align:center;padding:30px"><div style="font-size:40px;margin-bottom:14px">😕</div><div style="font-size:16px;font-weight:700;margin-bottom:8px">Tardó más de lo normal</div><div style="font-size:13px;opacity:.7;margin-bottom:18px">Verifica tu conexión a internet</div><button onclick="location.reload()" style="padding:11px 22px;background:#fff;color:#0F2A5E;border:none;border-radius:10px;font-weight:700;cursor:pointer;font-size:14px">🔄 Intentar de nuevo</button></div>';
    },45000);
    function montar(){
      if(window.TutelaYa&&window.React&&window.ReactDOM){
        clearInterval(prog);clearTimeout(timeout);
        barra.style.width='100%';
        var s=document.getElementById('splash');
        s.style.opacity='0';
        setTimeout(function(){s.style.display='none';},600);
        ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(window.TutelaYa));
      }else{setTimeout(montar,300);}
    }
  </script>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="./TutelaYa_FINAL.js"></script>
  <script>window.addEventListener('load',function(){setTimeout(montar,600);});</script>
</body>
</html>
