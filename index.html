<!DOCTYPE html>
<html lang="es-CO">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="description" content="TutelaYa — Abogado digital gratuito para colombianos"/>
  <meta name="theme-color" content="#0F2A5E"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <title>TutelaYa ⚖️</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:#0F2A5E;font-family:system-ui,sans-serif;}
    #splash{position:fixed;inset:0;background:linear-gradient(135deg,#0F2A5E,#1e40af);
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      color:#fff;z-index:9999;transition:opacity .6s ease;}
    .ico{font-size:56px;margin-bottom:16px;animation:bob 1.5s ease infinite;}
    .nom{font-size:26px;font-weight:800;margin-bottom:6px;}
    .sub{font-size:14px;opacity:.6;margin-bottom:28px;}
    .bar{width:180px;height:4px;background:rgba(255,255,255,.15);border-radius:99px;overflow:hidden;}
    .fill{height:100%;background:#fff;border-radius:99px;width:0;transition:width .3s;}
    @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
    #root{min-height:100vh;background:#F0F2F9;}
    #error{display:none;position:fixed;inset:0;background:#0F2A5E;color:#fff;
      align-items:center;justify-content:center;flex-direction:column;text-align:center;padding:20px;}
  </style>
</head>
<body>
  <div id="splash">
    <div class="ico">⚖️</div>
    <div class="nom">TutelaYa</div>
    <div class="sub">Cargando tu abogado digital...</div>
    <div class="bar"><div class="fill" id="barra"></div></div>
  </div>
  <div id="error">
    <div style="font-size:40px;margin-bottom:16px">😕</div>
    <div style="font-size:18px;font-weight:700;margin-bottom:10px">Tardó más de lo normal</div>
    <div style="font-size:14px;opacity:.7;margin-bottom:20px">Haz click en el botón para intentar de nuevo</div>
    <button onclick="location.reload()" style="padding:12px 24px;background:#fff;color:#0F2A5E;border:none;border-radius:10px;font-weight:700;cursor:pointer;font-size:15px">🔄 Intentar de nuevo</button>
  </div>
  <div id="root"></div>

  <script>
    // Barra de progreso animada
    var pct = 0;
    var barra = document.getElementById('barra');
    var progreso = setInterval(function(){
      pct += pct < 70 ? 2 : pct < 90 ? 0.5 : 0.1;
      if(pct > 95) pct = 95;
      barra.style.width = pct + '%';
    }, 200);

    // Timeout de 45 segundos
    var timeout = setTimeout(function(){
      document.getElementById('splash').style.display = 'none';
      var err = document.getElementById('error');
      err.style.display = 'flex';
    }, 45000);

    function montar(){
      var App = window.TutelaYa;
      if(App && window.React && window.ReactDOM){
        clearInterval(progreso);
        clearTimeout(timeout);
        barra.style.width = '100%';
        var splash = document.getElementById('splash');
        splash.style.opacity = '0';
        setTimeout(function(){ splash.style.display = 'none'; }, 600);
        ReactDOM.createRoot(document.getElementById('root')).render(
          React.createElement(App)
        );
      } else {
        setTimeout(montar, 300);
      }
    }
  </script>

  <!-- React 18 -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <!-- Babel con timeout extendido para archivos grandes -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- La app — con async para no bloquear -->
  <script type="text/babel" src="./TutelaYa_FINAL.jsx" data-presets="react" async></script>

  <script>
    // Esperar que cargue todo
    window.addEventListener('load', function(){
      setTimeout(montar, 1000);
    });
  </script>
</body>
</html>
