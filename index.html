<!DOCTYPE html>
<html lang="es-CO">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="description" content="TutelaYa — Abogado digital gratuito para colombianos"/>
  <meta name="theme-color" content="#0F2A5E"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <title>TutelaYa ⚖️</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:#0F2A5E;font-family:system-ui,sans-serif;}
    #splash{position:fixed;inset:0;background:linear-gradient(135deg,#0F2A5E,#1e40af);
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      color:#fff;z-index:9999;transition:opacity .6s ease;}
    .ico{font-size:56px;margin-bottom:16px;animation:bob 1.5s ease infinite;}
    .nom{font-size:26px;font-weight:800;margin-bottom:6px;}
    .sub{font-size:14px;opacity:.6;margin-bottom:28px;}
    .bar{width:180px;height:4px;background:rgba(255,255,255,.15);border-radius:99px;overflow:hidden;}
    .fill{height:100%;background:#fff;border-radius:99px;width:0;transition:width .3s;}
    @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
    #root{min-height:100vh;background:#F0F2F9;}
  </style>
</head>
<body>
  <div id="splash">
    <div class="ico">⚖️</div>
    <div class="nom">TutelaYa</div>
    <div class="sub">Tu abogado digital</div>
    <div class="bar"><div class="fill" id="barra"></div></div>
  </div>
  <div id="root"></div>

  <script>
    var pct = 0;
    var barra = document.getElementById('barra');
    var progreso = setInterval(function(){
      pct += pct < 80 ? 3 : 0.3;
      if(pct > 95) pct = 95;
      barra.style.width = pct + '%';
    }, 150);
  </script>

  <!-- React 18 UMD — sin Babel, carga directa -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <!-- App pre-compilada — JS puro, sin Babel -->
  <script src="./TutelaYa_FINAL.js"></script>

  <script>
    window.addEventListener('load', function(){
      clearInterval(progreso);
      barra.style.width = '100%';
      var splash = document.getElementById('splash');
      splash.style.opacity = '0';
      setTimeout(function(){ splash.style.display = 'none'; }, 500);
      if(window.TutelaYa && window.React && window.ReactDOM){
        ReactDOM.createRoot(document.getElementById('root')).render(
          React.createElement(window.TutelaYa)
        );
      } else {
        document.getElementById('root').innerHTML =
          '<div style="padding:40px;text-align:center;color:#DC2626;font-family:sans-serif">' +
          '<div style="font-size:32px;margin-bottom:12px">⚠️</div>' +
          '<div style="font-size:16px;font-weight:700">Error al cargar la aplicación</div>' +
          '<button onclick="location.reload()" style="margin-top:16px;padding:10px 20px;background:#0F2A5E;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:14px">🔄 Recargar</button>' +
          '</div>';
      }
    });
  </script>
</body>
</html>
